<!DOCTYPE html>
<html>
<head>
<title>User Event Registration Form</title>
</head>
<body>
<h1>User Event Registration Form</h1>
<form>
<label for="name">Name:</label>
<input type="text"id="name"name="name"required><br/>
  <label for="phone">phone:</label>
<input type="text"id="phone"name="phone"><br/>
<label for="email">Email:</label>
<input type="email"id="email"name="email"required><br/>

<label for="Organization">Organization:</label>
<input type="text"id="Organization"name="Organization"><br/>
<label for="attendee_type">Attendee Type:</label>
<select id="attendee_type"name="Attendee_type">
<Option value="general">General</option>
<Option value="vip">VIP</option>
<Option value="Speaker">Speaker</option>
</select>
<br><br>
<input type="submit"value="Register">
</form>
</body>
</html>
